function App() {
  const [screen, setScreen] = useState('title'); // title | playing | jail | gameover
  const [capeColor, setCapeColor] = useState('blue');
  const [hudData, setHudData] = useState({ distance: 0, friendsRescued: 0, lives: 3 });
  const [jailProgress, setJailProgress] = useState(0);
  const [highScores, setHighScores] = useState(loadHighScores());
  const [newBests, setNewBests] = useState({ distance: false, friends: false, time: false });

  const canvasRef = useRef(null);
  const gsRef = useRef(null);
  const inputRef = useRef({ up: false, down: false, left: false, right: false, space: false, jumpJustPressed: false });
  const rafRef = useRef(null);
  const lastTimeRef = useRef(0);
  const hudTimerRef = useRef(0);
  const jailTimerRef = useRef(0);
  const jailMashRef = useRef(0);
  const jailProgressRef = useRef(0);
  const jailBreakingRef = useRef(false);
  const screenRef = useRef(screen);

  screenRef.current = screen;

  // Keyboard input
  useEffect(() => {
    const onDown = (e) => {
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
        e.preventDefault();
      }
      if (e.key === 'ArrowUp' || e.key === 'w') { inputRef.current.up = true; inputRef.current.jumpJustPressed = true; }
      if (e.key === 'ArrowDown' || e.key === 's') inputRef.current.down = true;
      if (e.key === 'ArrowLeft' || e.key === 'a') inputRef.current.left = true;
      if (e.key === 'ArrowRight' || e.key === 'd') inputRef.current.right = true;
      if (e.key === ' ') {
        inputRef.current.space = true;
        inputRef.current.jumpJustPressed = true;
        // Jail mashing
        if (screenRef.current === 'jail') {
          jailMashRef.current++;
        }
      }
    };
    const onUp = (e) => {
      if (e.key === 'ArrowUp' || e.key === 'w') inputRef.current.up = false;
      if (e.key === 'ArrowDown' || e.key === 's') inputRef.current.down = false;
      if (e.key === 'ArrowLeft' || e.key === 'a') inputRef.current.left = false;
      if (e.key === 'ArrowRight' || e.key === 'd') inputRef.current.right = false;
      if (e.key === ' ') inputRef.current.space = false;
    };
    window.addEventListener('keydown', onDown);
    window.addEventListener('keyup', onUp);
    return () => { window.removeEventListener('keydown', onDown); window.removeEventListener('keyup', onUp); };
  }, []);

  const startGame = useCallback(() => {
    gsRef.current = createGameState(capeColor);
    setHudData({ distance: 0, friendsRescued: 0, lives: 3 });
    jailMashRef.current = 0;
    jailProgressRef.current = 0;
    setJailProgress(0);
    lastTimeRef.current = 0;
    setScreen('playing');
  }, [capeColor]);

  const handleJailMash = useCallback(() => {
    if (screenRef.current === 'jail') {
      jailMashRef.current++;
    }
  }, []);

  const handleRestart = useCallback(() => {
    setScreen('title');
  }, []);

  // Game loop
  useEffect(() => {
    if (screen !== 'playing' && screen !== 'jail' && screen !== 'gameover') {
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      return;
    }

    const canvas = canvasRef.current;
    if (!canvas) return;

    const loop = (timestamp) => {
      if (!lastTimeRef.current) lastTimeRef.current = timestamp;
      const rawDt = (timestamp - lastTimeRef.current) / 1000;
      lastTimeRef.current = timestamp;
      const dt = Math.min(rawDt, 0.05);

      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      const W = canvas.clientWidth;
      const H = canvas.clientHeight;

      if (canvas.width !== W * dpr || canvas.height !== H * dpr) {
        canvas.width = W * dpr;
        canvas.height = H * dpr;
      }

      ctx.save();
      ctx.scale(dpr, dpr);

      const gs = gsRef.current;
      const groundY = H * GROUND_RATIO;

      // Update game
      if (screenRef.current === 'playing') {
        const result = updateGame(gs, inputRef.current, dt, groundY, W, H);
        if (result === 'jail') {
          jailMashRef.current = 0;
          jailProgressRef.current = 0;
          setJailProgress(0);
          jailTimerRef.current = 0;
          jailBreakingRef.current = false;
          setScreen('jail');
        } else if (result === 'gameover') {
          gs.gameOverTime = gs.time;
          setHudData({ distance: gs.distance, friendsRescued: gs.friendsRescued, lives: 0 });
          // Check high scores
          const scores = loadHighScores();
          const nb = { distance: false, friends: false, time: false };
          if (gs.distance > scores.bestDistance) { scores.bestDistance = gs.distance; nb.distance = true; }
          if (gs.friendsRescued > scores.bestFriends) { scores.bestFriends = gs.friendsRescued; nb.friends = true; }
          if (gs.timeSurvived > scores.bestTime) { scores.bestTime = gs.timeSurvived; nb.time = true; }
          saveHighScores(scores);
          setHighScores(scores);
          setNewBests(nb);
          setScreen('gameover');
        }

        // Throttled HUD update
        hudTimerRef.current += dt;
        if (hudTimerRef.current > 0.25) {
          hudTimerRef.current = 0;
          setHudData({ distance: gs.distance, friendsRescued: gs.friendsRescued, lives: gs.lives });
        }
      }

      // Jail mini-game logic
      if (screenRef.current === 'jail') {
        jailTimerRef.current += dt;
        const mashCount = jailMashRef.current;
        const progress = (mashCount / JAIL_MASH_TARGET) * 100 - jailTimerRef.current * JAIL_DECAY;
        jailProgressRef.current = clamp(progress, 0, 100);
        setJailProgress(jailProgressRef.current);

        if ((jailProgressRef.current >= 100 || jailTimerRef.current > JAIL_TIMEOUT) && !jailBreakingRef.current) {
          jailBreakingRef.current = true;
          SFX.jailBreak();
          setTimeout(() => {
            if (gsRef.current) {
              gsRef.current.paused = false;
              gsRef.current.griffin.x = 150;
              gsRef.current.griffin.isInvincible = true;
              gsRef.current.griffin.invincibleTimer = INVINCIBLE_DURATION;
              gsRef.current.megalodon.distance = MEG_START_DIST * 0.6;
              gsRef.current.lives--;
              if (gsRef.current.lives <= 0) {
                SFX.gameOver();
                setScreen('gameover');
              } else {
                setHudData(prev => ({ ...prev, lives: gsRef.current.lives }));
                setScreen('playing');
              }
            }
          }, 700);
        }
      }

      // ── DRAW ──
      ctx.clearRect(0, 0, W, H);

      // Gameover: animate time for victory pose
      if (screenRef.current === 'gameover') {
        gs.time += dt;
      }

      if (screenRef.current === 'gameover') {
        // Victory pose scene
        drawSky(ctx, W, H, groundY);
        drawClouds(ctx, W, gs.scrollOffset, groundY);
        drawMountains(ctx, W, gs.scrollOffset, groundY);
        drawGround(ctx, W, H, gs.scrollOffset, groundY);
        drawVictoryPose(ctx, groundY, gs.time, gs.gameOverTime, gs.griffin.capeColor);
      } else {
      // Screen shake — extra intense when being eaten
      const baseShake = gs.megalodon.distance < 300
        ? (300 - gs.megalodon.distance) / 300 * 6
        : 0;
      const shakeIntensity = gs.isBeingEaten ? 12 : baseShake;
      if (shakeIntensity > 0) {
        ctx.translate(
          (Math.random() - 0.5) * shakeIntensity,
          (Math.random() - 0.5) * shakeIntensity
        );
      }

      // Background
      drawSky(ctx, W, H, groundY);
      drawClouds(ctx, W, gs.scrollOffset, groundY);
      drawMountains(ctx, W, gs.scrollOffset, groundY);
      drawGround(ctx, W, H, gs.scrollOffset, groundY);

      // Obstacles
      for (const obs of gs.obstacles) { obs._time = gs.time; drawObstacle(ctx, obs, groundY); }

      // Boosts
      for (const b of gs.boosts) drawBoost(ctx, b, gs.time);

      // Shields
      for (const s of gs.shields) drawShield(ctx, s, gs.time);

      // Honeys
      for (const h of gs.honeys) drawHoney(ctx, h, gs.time);

      // Jails
      for (const j of gs.jails) drawJail(ctx, j, gs.time);

      // Megalodon
      drawMegalodon(ctx, gs.megalodon, gs.time, groundY, W, gs.isBeingEaten);

      // Runners (behind Griffin)
      for (let i = gs.runners.length - 1; i >= 0; i--) {
        const runner = gs.runners[i];
        if (runner.alive || runner.catchPhase === 'catching') {
          drawRunner(ctx, runner, i, gs.griffin.x, gs.griffin.y, gs.time, groundY);
        }
      }

      // Celebration runners
      for (const cr of gs.celebrationRunners) {
        drawCelebrationRunner(ctx, cr, gs.griffin.x, gs.time, groundY);
      }

      // Griffin
      drawGriffin(ctx, gs.griffin, gs.time, groundY);

      // Shield aura (over Griffin)
      if (gs.griffin.shieldActive) {
        drawShieldAura(ctx, gs.griffin, gs.time, groundY);
      }

      // Particles
      drawParticles(ctx, gs.particles);

      // Speed lines when boosted
      if (gs.griffin.isBoosted) {
        drawSpeedLines(ctx, W, H, gs.time);
      }

      // Vignette
      const vignetteIntensity = gs.megalodon.distance < 300
        ? (300 - gs.megalodon.distance) / 300
        : 0;
      drawVignette(ctx, W, H, vignetteIntensity);

      // Roar effect
      if (gs.roarActive) drawRoar(ctx, W, H, gs.time, gs.roarStartTime);

      // Honey slow overlay
      if (gs.isSlowed) drawHoneyOverlay(ctx, W, H, gs.time, gs.honeyStartTime);

      // Near miss
      drawNearMiss(ctx, W, H, gs.time, gs.nearMissTime);

      // Hit flash overlay
      drawHitFlash(ctx, W, H, gs.hitFlashTimer);

      // Hit text ("OUCH!", "OOF!")
      drawHitText(ctx, W, H, gs.time, gs.hitTextTime);

      // Runner catch text
      drawRunnerCatchText(ctx, W, H, gs.time, gs.runnerCatchTextTime, gs.runnerCatchTextName);

      // Combo text
      drawComboText(ctx, W, H, gs.time, gs.comboDisplayTime, gs.comboDisplayText, gs.comboCount);

      // Eating red flash — "CHOMP!" text
      if (gs.isBeingEaten) {
        const eatenT = gs.time - gs.eatenStartTime;
        const flashAlpha = 0.15 + Math.sin(eatenT * 12) * 0.1;
        ctx.fillStyle = `rgba(200, 0, 0, ${flashAlpha})`;
        ctx.fillRect(0, 0, W, H);
        // CHOMP! text
        const chompScale = 1 + Math.sin(eatenT * 10) * 0.15;
        ctx.save();
        ctx.translate(W / 2, H * 0.3);
        ctx.scale(chompScale, chompScale);
        ctx.font = `bold ${Math.min(W * 0.12, 72)}px 'Segoe UI', Arial, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#fff';
        ctx.strokeStyle = '#880000';
        ctx.lineWidth = 5;
        ctx.strokeText('CHOMP!', 0, 0);
        ctx.fillText('CHOMP!', 0, 0);
        ctx.restore();
      }
      } // end else (not gameover)

      ctx.restore();

      rafRef.current = requestAnimationFrame(loop);
    };

    rafRef.current = requestAnimationFrame(loop);
    return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
  }, [screen]);

  return (
    <div style={{ width: '100%', height: '100%', position: 'relative' }}>
      <canvas ref={canvasRef} style={{ width: '100%', height: '100%', display: 'block' }} />

      {screen === 'title' && (
        <TitleScreen onStart={startGame} capeColor={capeColor} setCapeColor={setCapeColor} highScores={highScores} />
      )}

      {(screen === 'playing' || screen === 'jail') && (
        <>
          <HUD distance={hudData.distance} friendsRescued={hudData.friendsRescued} lives={hudData.lives} />
          <TouchControls inputRef={inputRef} />
        </>
      )}

      {screen === 'jail' && (
        <JailOverlay progress={jailProgress} onMash={handleJailMash} />
      )}

      {screen === 'gameover' && (
        <GameOverScreen
          distance={hudData.distance}
          friendsRescued={hudData.friendsRescued}
          timeSurvived={gsRef.current?.timeSurvived || 0}
          onRestart={handleRestart}
          highScores={highScores}
          newBests={newBests}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
